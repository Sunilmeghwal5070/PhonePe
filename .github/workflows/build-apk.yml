name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ ! -f debug.keystore ]; then
          echo "Generating new debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        fi

    - name: Create Dummy google-services.json
      run: |
        cat << 'DUMMY' > app/google-services.json
        {
          "project_info": {
            "project_number": "123456789012",
            "project_id": "dummy-project",
            "storage_bucket": "dummy-project.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789012:android:abcdef1234567890",
                "android_client_info": {
                  "package_name": "com.yash.phonepe"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "dummy-api-key"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }
        DUMMY

    - name: Bypass Corrupted Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        rm -f gradlew gradlew.bat

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        wrapper-validation: false

    - name: Build Debug APK
      run: gradle assembleDebug -Djava.awt.headless=true --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhonePe-App-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
