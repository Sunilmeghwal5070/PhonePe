name: Build APK Method 3 (Manual Gradle)

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Remove Corrupt Gradle Wrapper
      run: rm -f gradle/wrapper/gradle-wrapper.jar

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Decode Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi

    - name: Download & Install Gradle 8.9
      run: |
        wget https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip
        export PATH=$PWD/gradle-8.9/bin:$PATH
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-method-3-manual
        path: app/build/outputs/apk/debug/app-debug.apk
